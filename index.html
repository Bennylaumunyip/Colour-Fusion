<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colour Fusion - World of English</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Bubblegum+Sans&display=swap');

        :root {
            --primary-indigo: #6366f1;
            --primary-purple: #a855f7;
            --primary-pink: #ec4899;
        }

        body {
            font-family: 'Comic Neue', cursive;
            background: #fdfcf0;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .bubble-font { font-family: 'Bubblegum Sans', cursive; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border: 6px solid #fff;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            margin: auto;
        }

        .welcome-banner {
            background: linear-gradient(135deg, var(--primary-indigo), var(--primary-purple), var(--primary-pink));
            color: white;
            padding: 2.5rem 1.5rem;
            margin: -3rem -3rem 2.5rem -3rem;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            animation: shine 8s infinite linear;
        }

        @keyframes shine { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-primary { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; user-select: none; }
        .btn-primary:active { transform: scale(0.96); filter: brightness(0.9); }

        .rainbow-text {
            background-image: linear-gradient(to left, #ff3d3d, #ffb13d, #faff3d, #3dff6e, #3d8bff, #7a3dff, #ff3de8);
            -webkit-background-clip: text; color: transparent; background-size: 200% auto;
            animation: rainbowMove 4s linear infinite;
        }

        @keyframes rainbowMove { to { background-position: 200% center; } }

        .option-btn {
            border: 4px solid #f1f5f9;
            transition: all 0.15s ease;
            min-height: 70px;
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            text-align: left;
            width: 100%;
        }

        .option-btn.selected { border-color: var(--primary-indigo); background-color: #f5f7ff; }
        .correct { background-color: #ecfdf5 !important; border-color: #10b981 !important; color: #064e3b; }
        .wrong { background-color: #fef2f2 !important; border-color: #ef4444 !important; color: #7f1d1d; }

        .floating { animation: floating 4s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

        .progress-bar { height: 16px; border-radius: 8px; background: #f1f5f9; overflow: hidden; border: 2px solid #e2e8f0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ec4899, #8b5cf6, #3b82f6); transition: width 0.5s ease-out; }

        .learn-section { border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 1rem; background: #fff; border: 2px solid #f1f5f9; }

        .question-box {
            display: inline-block; min-width: 100px; height: 48px; background: #f8fafc;
            border: 3px dashed #cbd5e1; border-radius: 10px; margin: 0 6px; vertical-align: middle;
        }

        .question-box.filled {
            border-style: solid; background: #f0f4ff; border-color: var(--primary-indigo);
            color: var(--primary-indigo); padding: 0 12px; min-width: fit-content; line-height: 42px;
        }

        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6">

    <div id="game-container" class="w-full"></div>

    <script>
        const gameData = {
            lower: {
                title: "Lower Primary",
                homeMsg: "🎨 Welcome to the Colorful World of Words!",
                homeSub: "Just like mixing yellow and blue makes green, we can add letters to a root word to make brand new words!",
                learnContent: [
                    { title: "Prefixes", text: "A Prefix is a group of letters we add to the front of a word.", example: "If you take ‘happy’ and add ‘un-‘, you get ‘unhappy’ (which means not happy!)." },
                    { title: "Suffixes", text: "A Suffix is a group of letters we add to the back of a word.", example: "If you take ‘play’ and add ‘-ful’, you get ‘playful’ (which means full of play!)." },
                    { title: "Double Mix!", text: "Sometimes, you can add letters to the front and the back at the same time!", example: "‘un’- + ‘help’ + ‘-ful’ = ‘unhelpful’" }
                ],
                instructions: "Ready to play? Read the questions carefully. For each question, choose the answer that best fits in the sentence.",
                questions: [
                    { q: "I stepped on a sharp rock with my bare foot, and it was very ________.", options: ["painless", "painful"], correct: "painful", explain: "<b>Painless:</b> no pain.<br><b>Painful:</b> full of pain." },
                    { q: "The ________ puppy kept jumping around and wagging its tail.", options: ["replay", "playful", "player"], correct: "playful", explain: "<b>Replay:</b> to play something one more time.<br><b>Playful:</b> someone or something that is full of fun and wants to play.<br><b>Player:</b> a person who is playing a game or a sport." },
                    { q: "The ice cream was so ________ that I finished the whole bowl!", options: ["tasty", "tasteless", "tasteful"], correct: "tasty", explain: "<b>Tasteless:</b> food that doesn't have much flavour.<br><b>Tasty:</b> having a very good flavour.<br><b>Tasteful:</b> something looks or sounds nice, stylish, and polite." },
                    { q: "Air is a ________ gas, which is why we can see right through it.", options: ["colourful", "colourless"], correct: "colourless", explain: "<b>Colourful:</b> full of colours.<br><b>Colourless:</b> without any colours." },
                    { q: "The puppy was ________ because it could not find its mother.", options: ["fearless", "fearsome", "fearful"], correct: "fearful", explain: "<b>Fearsome:</b> describes something causing great fear.<br><b>Fearful:</b> means full of fear.<br><b>Fearless:</b> refers to being bold or brave." },
                    { q: "The soft pillows and fuzzy blankets made the bed feel very ______.", options: ["comforting", "comfortable", "comfortless"], correct: "comfortable", explain: "<b>Comforting:</b> ease the grief or distress of someone.<br><b>Comfortable:</b> able to give you comfort.<br><b>Comfortless:</b> without comfort." },
                    { q: "It is ______ to laugh at someone when they trip and fall.", options: ["kindness", "unkind", "kindly"], correct: "unkind", explain: "<b>Kindness:</b> the act of being nice.<br><b>Unkind:</b> not being nice.<br><b>Kindly:</b> doing something in a nice way." },
                    { q: "Don't throw away that jar, we can _______ it as a pencil holder!", options: ["useful", "reuse", "useless"], correct: "reuse", explain: "<b>Useful:</b> very helpful.<br><b>Reuse:</b> to use something again.<br><b>Useless:</b> not helpful at all." },
                    { q: "Tommy looks _______ because he finally got the toy he wanted.", options: ["cheerful", "cheerless", "cheering"], correct: "cheerful", explain: "<b>Cheerful:</b> full of cheer.<br><b>Cheerless:</b> without cheer.<br><b>Cheering:</b> doing the action of shouting for joy." },
                    { q: "The baby is _______ because she cannot walk or eat by herself yet.", options: ["helpful", "helpless", "helper"], correct: "helpless", explain: "<b>Helpful:</b> gives a lot of help.<br><b>Helpless:</b> not being able to help yourself." }
                ]
            },
            middle: {
                title: "Middle Primary",
                homeMsg: "🎨 Welcome to the Colorful World of Words!",
                homeSub: "Just like mixing yellow and blue makes green, we combine verbs with a particle to make brand new words! They are called phrasal verbs.",
                learnContent: [
                    { title: "A Verb", text: "A verb is an action word.", example: "give, break, take" },
                    { title: "A Particle", text: "A particle is a small 'helper word' that completely changes the meaning of the verb it's attached to.", example: "up, off, out" },
                    { title: "The Result", text: "When we combine 'give' with 'up', we get 'give up'.", example: "<b>Give up:</b> To stop trying or quit.<br>Example: 'Don't give up on that math problem!'" }
                ],
                instructions: "Ready to play? Read the questions carefully. For each question, choose the answer that best fits in the sentence.",
                questions: [
                    { q: "We had to_____________ the picnic because of rain.", options: ["Put off", "Put away", "Put out"], correct: "Put off", explain: "<b>Put off:</b> To delay doing something until later.<br><b>Put away:</b> To tidy up.<br><b>Put out:</b> To extinguish a fire." },
                    { q: "The scientist’s hard work helped _____________ a cure for the illness.", options: ["bring about", "bring up", "bring back"], correct: "bring about", explain: "<b>Bring up:</b> To mention a topic.<br><b>Bring back:</b> To return an object.<br><b>Bring about:</b> To cause something to happen." },
                    { q: "To keep your lungs healthy and strong, it is important to _____________ from vapes.", options: ["keep away", "keep back", "keep out"], correct: "keep away", explain: "<b>Keep out:</b> To stay away from a place.<br><b>Keep away:</b> To avoid going near something.<br><b>Keep back:</b> To stay at a safe distance." },
                    { q: "Leo and his sister always _____________ when they have to share the toys.", options: ["fall out", "fall down", "fall through"], correct: "fall out", explain: "<b>Fall out:</b> To have an argument and stop being friends.<br><b>Fall down:</b> To trip and hit the ground.<br><b>Fall through:</b> When a plan fails." },
                    { q: "Since he was not hungry for his vegetables, Leo started to _____________ his salad while everyone else finished.", options: ["pick away", "pick at", "pick on"], correct: "pick at", explain: "<b>Pick away:</b> To slowly remove bits.<br><b>Pick on:</b> To tease or be mean.<br><b>Pick at:</b> To eat small bites because you aren't hungry." },
                    { q: "As soon as the music started, the whole class decided to _____________ a dance.", options: ["break into", "break out in"], correct: "break into", explain: "<b>Break into:</b> To start doing something suddenly.<br><b>Break out in:</b> To suddenly get a rash or sweat." },
                    { q: "We should _____________ on going to the beach until the rain stops.", options: ["hold out", "hold off"], correct: "hold off", explain: "<b>Hold out:</b> To wait for something better.<br><b>Hold off:</b> To delay doing something." },
                    { q: "After eating ten cupcakes and riding the roller coaster, Leo felt like he was going to _____________.", options: ["throw out", "throw up"], correct: "throw up", explain: "<b>Throw out:</b> To discard.<br><b>Throw up:</b> To vomit." },
                    { q: "The workers had to _____________ the old building to build a new one.", options: ["pull apart", "pull down"], correct: "pull down", explain: "<b>Pull apart:</b> To separate things or people fighting.<br><b>Pull down:</b> To demolish a building." },
                    { q: "After arguing all morning, Sarah and Maya finally decided to _____________ and play together again.", options: ["make up", "make out"], correct: "make up", explain: "<b>Make up:</b> To become friends again after a fight.<br><b>Make out:</b> To barely see or hear something." }
                ]
            },
            upper: {
                title: "Upper Primary",
                homeMsg: "🎨 Welcome to the Colorful World of Words!",
                homeSub: "In art, Blue and Orange are a classic combo... Prepositional collocations work the same way! The verb stays the same color, but wears a specific preposition for its 'signature look'!",
                learnContent: [
                    { title: "Collocations", text: "Unlike Phrasal Verbs, Collocations are just about grammar style in context. The meaning does not change, but the partnership is permanent.", example: "" },
                    { title: "No New Colour", text: "You are not mixing a new colour, you are just making sure your colours match!", example: "" },
                    { title: "Example", text: "<b>I am interested in video games.</b> (correct preposition)<br><b>I am interested at video games.</b> (incorrect preposition)", example: "" }
                ],
                instructions: "Ready to play? Read the questions carefully. For each question, choose the answer that best fits in the sentence.",
                questions: [
                    { q: "John has been _____________ theft.", options: ["accused of", "accused for", "accused to"], correct: "accused of", explain: "Accused is followed by 'of' when referring to a charge." },
                    { q: "Leo was completely _____________ the new video game.", options: ["addicted to", "addicted at", "addicted with"], correct: "addicted to", explain: "One is 'addicted to' a habit." },
                    { q: "We were ___________ how he survived the horrific accident.", options: ["amazed at", "amazed with", "amazed of"], correct: "amazed at", explain: "The standard preposition for 'amazed' is 'at'." },
                    { q: "Suzie is _____________ seafood so she always double-checks the menu.", options: ["allergic with", "allergic to", "allergic from"], correct: "allergic to", explain: "Prepositional collocation for allergies is 'to'." },
                    { q: "The baby is _____________ the dark so her parents leave a lamp on.", options: ["afraid with", "afraid of", "afraid by"], correct: "afraid of", explain: "The correct collocation is 'afraid of'." },
                    { q: "It will take time for the students to accustom themselves _____________ the changes.", options: ["with", "to", "at"], correct: "to", explain: "To 'accustom yourself to' something." },
                    { q: "Maya had to _____________ accidentally knocking over the jar of orange paint.", options: ["apologise for", "apologise to", "apologise from"], correct: "apologise for", explain: "You apologise 'for' a mistake." },
                    { q: "Sarah felt _____________ the upcoming art competition.", options: ["anxious with", "anxious about", "anxious for"], correct: "anxious about", explain: "One feels 'anxious about' a future event." },
                    { q: "Leo was caught in the heavy rain and he _____________ a high fever.", options: ["suffered from", "suffered to", "suffered at"], correct: "suffered from", explain: "One 'suffers from' a condition or disease." },
                    { q: "The new Roblox game was incredibly _____________ the students at school.", options: ["popular with", "popular to", "popular at"], correct: "popular with", explain: "When something is liked by a group, it is 'popular with' them." }
                ]
            }
        };

        let state = { 
            view: 'home', 
            level: null, 
            currentQuestionIndex: 0, 
            score: 0, 
            shuffledQuestions: [], 
            selectedOption: null, 
            isAnswered: false 
        };

        function render() {
            const container = document.getElementById('game-container');
            const data = state.level ? gameData[state.level] : null;

            if (state.view === 'home') {
                container.innerHTML = `
                    <div class="card p-8 md:p-12 text-center animate-fadeIn">
                        <div class="welcome-banner">
                            <h2 class="bubble-font text-2xl md:text-4xl font-bold leading-tight">Welcome to the Colorful World of Words!</h2>
                        </div>
                        <h1 class="bubble-font text-6xl md:text-8xl mb-8 rainbow-text floating">Colour Fusion</h1>
                        <p class="text-xl md:text-2xl text-gray-500 mb-10">Pick your level to start the adventure!</p>
                        <div class="grid gap-6 md:grid-cols-3">
                            <button onclick="selectLevel('lower')" class="py-8 rounded-3xl bg-pink-500 text-white text-2xl md:text-3xl font-bold btn-primary shadow-lg border-b-8 border-pink-700">
                                <span class="block">Lower</span><span class="text-lg opacity-80 font-normal">P1 - P2</span>
                            </button>
                            <button onclick="selectLevel('middle')" class="py-8 rounded-3xl bg-orange-500 text-white text-2xl md:text-3xl font-bold btn-primary shadow-lg border-b-8 border-orange-700">
                                <span class="block">Middle</span><span class="text-lg opacity-80 font-normal">P3 - P4</span>
                            </button>
                            <button onclick="selectLevel('upper')" class="py-8 rounded-3xl bg-blue-500 text-white text-2xl md:text-3xl font-bold btn-primary shadow-lg border-b-8 border-blue-700">
                                <span class="block">Upper</span><span class="text-lg opacity-80 font-normal">P5 - P6</span>
                            </button>
                        </div>
                    </div>`;
            } else if (state.view === 'learn') {
                container.innerHTML = `
                    <div class="card p-6 md:p-10 animate-fadeIn h-[85vh] flex flex-col">
                        <h2 class="bubble-font text-4xl md:text-5xl text-center mb-6 rainbow-text shrink-0">Let's Learn Together!</h2>
                        <div class="bg-indigo-50 p-6 rounded-2xl mb-6 text-center shrink-0 border-2 border-indigo-100">
                            <p class="text-xl md:text-2xl text-indigo-900 font-bold leading-relaxed">${data.homeSub}</p>
                        </div>
                        <div class="flex-grow overflow-y-auto custom-scroll pr-2 mb-6">
                            ${data.learnContent.map(item => `
                                <div class="learn-section border-l-8 border-l-indigo-400">
                                    <h4 class="text-2xl font-black mb-1 text-gray-800">${item.title}</h4>
                                    <p class="text-lg md:text-xl text-gray-700 mb-2">${item.text}</p>
                                    ${item.example ? `<p class="text-indigo-600 bg-white border border-indigo-50 p-3 rounded-xl font-bold">✨ ${item.example}</p>` : ''}
                                </div>`).join('')}
                        </div>
                        <button onclick="setView('instructions')" class="w-full py-5 rounded-2xl bg-green-500 text-white text-2xl font-bold btn-primary shadow-lg border-b-8 border-green-700 shrink-0">I'm Ready!</button>
                    </div>`;
            } else if (state.view === 'instructions') {
                container.innerHTML = `
                    <div class="card p-10 md:p-16 text-center animate-fadeIn">
                        <div class="text-7xl mb-6">🎨</div>
                        <h2 class="bubble-font text-4xl md:text-5xl mb-6 text-indigo-600">The Rules</h2>
                        <p class="text-2xl md:text-3xl text-gray-700 mb-10 leading-relaxed font-bold">${data.instructions}</p>
                        <button onclick="startGame()" class="w-full py-6 rounded-3xl bg-indigo-600 text-white text-3xl font-bold btn-primary shadow-lg border-b-8 border-indigo-800">START FUSION!</button>
                    </div>`;
            } else if (state.view === 'quiz') {
                const q = state.shuffledQuestions[state.currentQuestionIndex];
                const progress = ((state.currentQuestionIndex) / 10) * 100;
                const questionHtml = q.q.replace(/_{3,}|…/g, state.isAnswered ? `<span class="question-box filled">${state.selectedOption}</span>` : `<span class="question-box"></span>`);
                container.innerHTML = `
                    <div class="card p-5 md:p-10 animate-fadeIn">
                        <div class="flex justify-between items-center mb-5">
                            <span class="px-5 py-2 bg-gray-100 rounded-full font-bold text-xl text-gray-500">${state.currentQuestionIndex + 1} / 10</span>
                            <button onclick="speakText('${q.q}')" class="w-14 h-14 rounded-full bg-indigo-500 text-white flex items-center justify-center btn-primary"><i class="fas fa-volume-up text-xl"></i></button>
                        </div>
                        <div class="progress-bar mb-6"><div class="progress-fill" style="width: ${progress}%"></div></div>
                        <div class="min-h-[100px] text-center mb-8 flex items-center justify-center">
                            <h3 class="text-2xl md:text-4xl font-black text-gray-800 leading-snug">${questionHtml}</h3>
                        </div>
                        <div class="grid gap-4 mb-6">
                            ${q.options.map(opt => `
                                <button onclick="handleOptionSelect('${opt}')" ${state.isAnswered ? 'disabled' : ''} class="option-btn text-xl md:text-2xl font-bold bg-white border-2 shadow-sm ${state.isAnswered ? (opt === q.correct ? 'correct' : (opt === state.selectedOption ? 'wrong' : '')) : (state.selectedOption === opt ? 'selected' : '')}">
                                    <span class="mr-4 w-8 text-center">${state.isAnswered ? (opt === q.correct ? '✅' : (opt === state.selectedOption ? '❌' : '')) : ''}</span>${opt}
                                </button>`).join('')}
                        </div>
                        ${state.isAnswered ? `
                            <div class="p-5 rounded-2xl bg-gray-50 border-2 border-gray-100 mb-6"><p class="text-lg md:text-xl text-gray-700">${q.explain}</p></div>
                            <button onclick="nextQuestion()" class="w-full py-5 rounded-2xl bg-indigo-600 text-white text-2xl font-bold btn-primary border-b-8 border-indigo-800">${state.currentQuestionIndex === 9 ? 'FINISH' : 'NEXT'}</button>
                        ` : `
                            <button onclick="submitAnswer()" ${!state.selectedOption ? 'disabled opacity-50' : ''} class="w-full py-5 rounded-2xl bg-indigo-500 text-white text-2xl font-bold btn-primary border-b-8 border-indigo-700">CHECK ANSWER</button>
                        `}
                    </div>`;
            } else if (state.view === 'results') {
                const p = (state.score / 10) * 100;
                let b = p === 100 ? "💎" : (p >= 70 ? "🥇" : "🥈");
                container.innerHTML = `
                    <div class="card p-10 text-center animate-fadeIn relative">
                        <h2 class="bubble-font text-5xl md:text-7xl mb-8 rainbow-text">Fusion Results!</h2>
                        <div class="text-9xl mb-6 floating leading-none">${b}</div>
                        <p class="text-3xl font-black text-gray-800 mb-6">${p === 100 ? "PERFECT!" : (p >= 70 ? "WORD WIZARD!" : "GREAT EFFORT!")}</p>
                        <div class="inline-block px-10 py-5 bg-indigo-50 rounded-3xl border-4 border-indigo-100 mb-10">
                            <span class="text-7xl font-black text-indigo-600">${state.score}</span><span class="text-3xl font-bold text-gray-400">/ 10</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="retryGame()" class="py-5 rounded-2xl bg-indigo-600 text-white text-2xl font-bold btn-primary border-b-8 border-indigo-800">RETRY</button>
                            <button onclick="state.view='home'; state.level=null; render();" class="py-5 rounded-2xl bg-white text-gray-600 text-2xl font-bold btn-primary border-2 border-gray-200 border-b-8">HOME</button>
                        </div>
                    </div>`;
            }
        }

        function setView(v) { state.view = v; render(); }
        function selectLevel(l) { state.level = l; state.view = 'learn'; render(); }
        
        function startGame() {
            state.shuffledQuestions = [...gameData[state.level].questions].sort(() => 0.5 - Math.random()).slice(0, 10);
            state.currentQuestionIndex = 0; state.score = 0; state.view = 'quiz'; state.isAnswered = false; state.selectedOption = null; render();
        }

        function retryGame() {
            // When choosing retry, restart at the "Let's learn" section as requested
            state.currentQuestionIndex = 0;
            state.score = 0;
            state.isAnswered = false;
            state.selectedOption = null;
            state.view = 'learn';
            render();
        }

        function handleOptionSelect(o) { if (state.isAnswered) return; state.selectedOption = o; render(); }
        
        function submitAnswer() {
            if (!state.selectedOption) return;
            state.isAnswered = true;
            if (state.selectedOption === state.shuffledQuestions[state.currentQuestionIndex].correct) state.score++;
            render();
        }

        function nextQuestion() {
            if (state.currentQuestionIndex < 9) { state.currentQuestionIndex++; state.isAnswered = false; state.selectedOption = null; render(); }
            else { setView('results'); }
        }

        function speakText(t) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(t.replace(/_{3,}|…/g, "blank"));
                u.lang = 'en-GB'; u.rate = 0.85; speechSynthesis.speak(u);
            }
        }

        render();
    </script>
</body>
</html>
